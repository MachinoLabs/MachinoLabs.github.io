<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Green Room | Sustainable. Organic. Beautiful.</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #b76e79; /* MachinoLabs Rose Gold */
            --accent-light: #e5c1c5;
            --primary-bg: #1a1a1a; /* Deep Charcoal */
            --machino-cyan: #00e5ff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Montserrat', sans-serif;
            background: radial-gradient(circle, #2a2a2a 0%, #0a0a0a 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .coupon-card {
            background: var(--primary-bg);
            max-width: 400px;
            width: 100%;
            border-radius: 30px;
            text-align: center;
            border: 1px solid var(--accent);
            box-shadow: 0 20px 60px rgba(0,0,0,0.8), 0 0 15px rgba(183, 110, 121, 0.2);
            padding: 40px 20px;
            position: relative;
        }

        .logo-svg { width: 100%; max-width: 320px; height: auto; margin-bottom: 10px; }

        .tagline {
            color: var(--accent-light);
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.4rem;
            margin-bottom: 25px;
            letter-spacing: 1px;
            opacity: 0.9;
        }

        .scratch-container {
            position: relative;
            width: 280px;
            height: 140px;
            margin: 0 auto;
            background: #fff;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid var(--accent);
        }

        .prize-revealed {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: white;
            z-index: 1;
            padding: 10px;
        }

        #prize-amount { color: #1a1a1a; font-size: 1.8rem; font-weight: 700; line-height: 1.1; font-family: 'Playfair Display', serif; }
        #prize-desc { color: var(--accent); font-weight: 700; font-size: 0.8rem; letter-spacing: 1.5px; margin-top: 8px; text-transform: uppercase; }
        .limit-text { font-size: 0.6rem; color: #aaa; margin-top: 6px; font-weight: 400; text-transform: uppercase; }

        #scratch-canvas { position: absolute; top: 0; left: 0; z-index: 2; touch-action: none; cursor: crosshair; }

        #action-area { display: none; margin-top: 30px; animation: fadeIn 0.8s ease-out; }
        .btn-claim {
            display: block;
            background: linear-gradient(to bottom, var(--accent-light), var(--accent));
            color: #fff;
            text-decoration: none;
            padding: 18px;
            border-radius: 5px; /* Sleeker, less rounded for high-end look */
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 2px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-transform: uppercase;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .instruction { color: white; font-size: 0.7rem; margin-top: 15px; letter-spacing: 3px; opacity: 0.6; text-transform: uppercase; }
        .footer { color: var(--accent); font-size: 0.6rem; margin-top: 25px; letter-spacing: 1.5px; line-height: 1.6; opacity: 0.8; }

        .machino-signature { margin-top: 40px; text-align: center; }
        .machino-link { text-decoration: none; font-size: 0.65rem; color: rgba(255, 255, 255, 0.4); letter-spacing: 2.5px; text-transform: uppercase; }
        .machino-link span { color: var(--machino-cyan); font-weight: 900; }
        .contact-info { color: rgba(255, 255, 255, 0.3); font-size: 0.6rem; margin-top: 8px; }
    </style>
</head>
<body>

    <div class="coupon-card">
        <svg viewBox="0 0 400 80" class="logo-svg">
            <text x="50%" y="60%" text-anchor="middle" fill="#b76e79" style="font-family:'Playfair Display', serif; font-weight: 700; font-size: 32px; letter-spacing: 4px; text-transform: uppercase;">The Green Room</text>
        </svg>

        <p class="tagline">Sustainable. Organic. Beautiful.</p>

        <div class="scratch-container">
            <div class="prize-revealed">
                <h2 id="prize-amount">REVEALING</h2>
                <p id="prize-desc">Boutique Service</p>
                <p class="limit-text">* One per client. New bookings only.</p>
            </div>
            <canvas id="scratch-canvas" width="280" height="140"></canvas>
        </div>

        <p class="instruction" id="hint">Scratch to Reveal Your Gift</p>

        <div id="action-area">
            <a href="tel:7172731000" class="btn-claim">Book Appointment</a>
            <p id="claim-instruction" style="color:white; font-size: 0.75rem; margin-top:10px; font-weight: 300; letter-spacing: 1px;"></p>
        </div>

        <div class="footer">
            812 CHESTNUT ST, LEBANON • SINCE 2011<br>
            ECO-FRIENDLY • ORGANIC • ARTISAN
        </div>
    </div>

    <div class="machino-signature">
        <a href="https://machinolabs.com" target="_blank" class="machino-link">Built by <span>MachinoLabs</span></a>
        <div class="contact-info">JOE • 717.623.2907</div>
    </div>

    <canvas id="confetti" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999;"></canvas>

    <script>
        const prizes = [
            { amount: "FREE", desc: "DEEP CONDITIONING TREATMENT", code: "RENEW" },
            { amount: "$10.00 OFF", desc: "ANY COLOR SERVICE", code: "COLOR10" },
            { amount: "FREE", desc: "SCALP MASSAGE UPGRADE", code: "CALM" },
            { amount: "20% OFF", desc: "ORGANIC RETAIL PRODUCTS", code: "GREEN20" },
            { amount: "FREE", desc: "BLOWOUT w/ ANY CUT", code: "STYLE" },
            { amount: "$5.00 OFF", desc: "MANICURE OR PEDICURE", code: "GLO5" },
            { amount: "FREE", desc: "BOTANICAL HAIR MASK", code: "PLANT" },
            { amount: "15% OFF", desc: "NEW CLIENT WELCOME PKG", code: "HELLO15" },
            { amount: "COMPLIMENTARY", desc: "GLOSS TREATMENT", code: "SHINE" },
            { amount: "MYSTERY", desc: "STYLIST'S CHOICE UPGRADE", code: "SURPRISE" }
        ];

        const canvas = document.getElementById('scratch-canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        let isDrawing = false; let isRevealed = false;

        function init() {
            const selectedPrize = prizes[Math.floor(Math.random() * prizes.length)];
            document.getElementById('prize-amount').innerText = selectedPrize.amount;
            document.getElementById('prize-desc').innerText = selectedPrize.desc;
            document.getElementById('claim-instruction').innerText = "Mention code " + selectedPrize.code + " when booking!";

            const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            grad.addColorStop(0, '#b76e79'); grad.addColorStop(0.5, '#e5c1c5'); grad.addColorStop(1, '#b76e79');
            ctx.fillStyle = grad; ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#ffffff'; ctx.font = '600 12px Montserrat'; ctx.textAlign = 'center';
            ctx.fillText('REVEAL YOUR GIFT', canvas.width/2, canvas.height/2 + 5);
        }

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        function scratch(e) {
            if (!isDrawing || isRevealed) return;
            const pos = getPos(e);
            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath(); ctx.arc(pos.x, pos.y, 25, 0, Math.PI * 2); ctx.fill();
            checkPercent();
        }

        function checkPercent() {
            const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            let clear = 0;
            for (let i = 0; i < data.length; i += 4) { if (data[i + 3] < 128) clear++; }
            if (clear / (data.length / 4) > 0.5) {
                isRevealed = true;
                canvas.style.transition = 'opacity 0.6s'; canvas.style.opacity = '0';
                setTimeout(() => {
                    canvas.style.display = 'none';
                    document.getElementById('action-area').style.display = 'block';
                    document.getElementById('hint').style.display = 'none';
                    triggerConfetti();
                }, 600);
            }
        }

        canvas.addEventListener('mousedown', () => isDrawing = true);
        canvas.addEventListener('touchstart', (e) => { isDrawing = true; e.preventDefault(); });
        window.addEventListener('mouseup', () => isDrawing = false);
        window.addEventListener('touchend', () => isDrawing = false);
        canvas.addEventListener('mousemove', scratch); canvas.addEventListener('touchmove', scratch);

        function triggerConfetti() {
            const c = document.getElementById('confetti'); const s = c.getContext('2d');
            c.width = window.innerWidth; c.height = window.innerHeight;
            let p = Array.from({length: 100}, () => ({
                x: Math.random() * c.width, y: -20,
                r: Math.random() * 4 + 2, v: Math.random() * 3 + 2,
                color: `rgba(183, 110, 121, ${Math.random()})`
            }));
            function frame() {
                s.clearRect(0,0,c.width,c.height);
                p.forEach(i => { i.y += i.v; s.fillStyle = i.color; s.fillRect(i.x, i.y, i.r, i.r); });
                requestAnimationFrame(frame);
            }
            frame();
        }
        window.onload = init;
    </script>
</body>
</html>
