<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MachinoLabs | High-Performance Digital Marketing</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyan: #00e5ff;
            --dark-bg: #050505;
            --card-bg: #111111;
            --text-gray: #94a3b8;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--dark-bg);
            color: white;
            line-height: 1.6;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 60px 20px;
            text-align: center;
        }
        .agency-logo {
            width: 180px; 
            height: auto;
            margin-bottom: 25px;
            filter: drop-shadow(0 0 15px rgba(0, 229, 255, 0.4));
        }
        h1 {
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: -1.5px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        h1 span { color: var(--cyan); }
        p.subtitle {
            font-size: 1.1rem;
            color: var(--text-gray);
            max-width: 700px;
            margin: 0 auto 50px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-top: 40px;
        }
        .project-card {
            background: var(--card-bg);
            border: 1px solid #222;
            border-radius: 24px;
            padding: 35px;
            transition: all 0.3s ease;
            text-decoration: none;
            color: white;
            text-align: left;
            display: flex;
            flex-direction: column;
        }
        .project-card:hover {
            border-color: var(--cyan);
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(0, 229, 255, 0.1);
        }
        .project-card h3 { font-size: 1.4rem; margin: 15px 0 10px; color: var(--cyan); }
        .project-card p { color: var(--text-gray); font-size: 0.9rem; margin-bottom: 20px; flex-grow: 1; }
        .badge {
            align-self: flex-start;
            padding: 4px 12px;
            background: rgba(0, 229, 255, 0.1);
            color: var(--cyan);
            border-radius: 50px;
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .contact-box {
            margin-top: 80px;
            padding: 50px;
            background: linear-gradient(145deg, #0f0f0f, #000);
            border-radius: 30px;
            border: 1px solid #222;
        }
        .btn-call {
            display: inline-block;
            background: var(--cyan);
            color: black;
            text-decoration: none;
            padding: 18px 45px;
            border-radius: 50px;
            font-weight: 900;
            margin-top: 25px;
            font-size: 1rem;
        }
        footer { margin-top: 60px; padding-bottom: 30px; font-size: 0.7rem; color: #444; letter-spacing: 3px; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="container">
        <img src="logo.png" alt="MachinoLabs Logo" class="agency-logo">
        <h1><span>Machino</span>Labs</h1>
        <p class="subtitle">Architecting high-conversion digital experiences that stop the scroll and gamify the customer journey.</p>
