<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Hershey Barber Co. | Signature Reward</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Great+Vibes&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --matte-black: #0a0a0a;
            --gold: #d4af37;
            --gold-light: #f1d592;
            --cyan: #00e5ff;
            --text-gray: #a0a0a0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--matte-black);
            font-family: 'Montserrat', sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            text-align: center;
        }

        /* DNA Header */
        .header { margin-top: 20px; margin-bottom: 30px; }
        .brand-name { 
            font-family: 'Great Vibes', cursive; 
            font-size: 2.5rem; 
            color: var(--gold);
            margin-bottom: 5px;
        }
        .tagline { 
            font-size: 0.8rem; 
            letter-spacing: 3px; 
            text-transform: uppercase; 
            color: var(--text-gray);
        }

        .instruction {
            margin-bottom: 20px;
            font-size: 1.1rem;
            font-weight: bold;
            color: #fff;
        }

        /* Scratch-Off Engine */
        #scratch-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 0 auto;
            background: #1a1a1a;
            border: 4px solid var(--gold);
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
            overflow: hidden;
        }

        #prize-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        #prize-text {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--gold);
            margin-bottom: 15px;
        }

        .claim-btn {
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            color: black;
            padding: 12px 25px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
            display: none; /* Shown after reveal */
            animation: pulse 1.5s infinite;
        }

        canvas {
            position: absolute;
            top: 0; left: 0;
            touch-action: none; /* Prevents wiggling on mobile */
            cursor: crosshair;
        }

        #loading-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--matte-black);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            font-weight: bold;
        }

        /* Footer Signature */
        .footer {
            margin-top: auto;
            padding: 40px 20px;
            text-align: center;
        }
        .signature-text {
            font-size: 0.7rem;
            letter-spacing: 1px;
            color: #444;
            text-transform: uppercase;
        }
        .signature-link {
            color: var(--cyan);
            text-decoration: none;
            font-weight: bold;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1 class="brand-name">The Hershey Barber Co.</h1>
            <p class="tagline">Classic Techniques. Modern Style.</p>
        </div>

        <p class="instruction">Scratch to reveal your Tuesday/Wednesday Special</p>

        <div id="scratch-container">
            <div id="loading-overlay">PREPARING...</div>
            <div id="prize-layer">
                <div id="prize-text"></div>
                <a href="tel:7175332887" class="claim-btn" id="claim-button">TAP TO BOOK NOW</a>
            </div>
            <canvas id="scratch-canvas" width="300" height="300"></canvas>
        </div>
    </div>

    <footer class="footer">
        <p class="signature-text">Built by <a href="https://machinolabs.com" class="signature-link">MachinoLabs</a></p>
        <p style="font-size: 0.65rem; color: #333; margin-top: 5px;">Joe • 717.623.2907</p>
    </footer>

    <script>
        const prizes = [
            "Complimentary Hot Towel Treatment",
            "$5 Off A Signature Haircut",
            "Free Beard Trim with Haircut",
            "Complimentary Straight Razor Edge",
            "10% Off Grooming Products",
            "Free Scalp Massage",
            "Mid-Week Special: $3 Off",
            "Complimentary Beverage",
            "Free Styling Product Sample",
            "15% Off Any Grooming Kit"
        ];

        let canvas = document.getElementById('scratch-canvas');
        let ctx = canvas.getContext('2d');
        let isDrawing = false;
        let isRevealed = false;

        function init() {
            // Randomize Prize
            const randomPrize = prizes[Math.floor(Math.random() * prizes.length)];
            document.getElementById('prize-text').innerText = randomPrize;

            // Prepare Canvas
            ctx.fillStyle = '#d4af37'; // Gold Foil
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Add "Foil Texture"
            for(let i=0; i<500; i++) {
                ctx.fillStyle = 'rgba(255,255,255,0.1)';
                ctx.fillRect(Math.random()*300, Math.random()*300, 2, 2);
            }

            // Remove loading
            document.getElementById('loading-overlay').style.display = 'none';

            // Events
            canvas.addEventListener('mousedown', startDrawing);
            canvas.addEventListener('mousemove', draw);
            canvas.addEventListener('mouseup', stopDrawing);
            canvas.addEventListener('touchstart', startDrawing);
            canvas.addEventListener('touchmove', draw);
            canvas.addEventListener('touchend', stopDrawing);
        }

        function startDrawing(e) { isDrawing = true; draw(e); }
        function stopDrawing() { isDrawing = false; checkReveal(); }

        function draw(e) {
            if (!isDrawing || isRevealed) return;
            e.preventDefault();
            
            let rect = canvas.getBoundingClientRect();
            let x = (e.pageX || e.touches[0].pageX) - rect.left - window.scrollX;
            let y = (e.pageY || e.touches[0].pageY) - rect.top - window.scrollY;

            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath();
            ctx.arc(x, y, 25, 0, Math.PI * 2);
            ctx.fill();
        }

        function checkReveal() {
            let imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            let pixels = imageData.data;
            let transparentPixels = 0;

            for (let i = 3; i < pixels.length; i += 4) {
                if (pixels[i] === 0) transparentPixels++;
            }

            let percentage = transparentPixels / (pixels.length / 4);

            // 50% Threshold trigger
            if (percentage > 0.5 && !isRevealed) {
                isRevealed = true;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                document.getElementById('claim-button').style.display = 'inline-block';
                
                confetti({
                    particleCount: 100,
                    spread: 70,
                    origin: { y: 0.6 },
                    colors: ['#d4af37', '#ffffff', '#00e5ff']
                });
            }
        }

        // MachinoLabs Loading Fix
        window.onload = init;
    </script>
</body>
</html>
